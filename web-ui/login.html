<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đăng nhập — Smart Muster Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <strong>SMART MUSTER CAMERA</strong>
      <span>Phần mềm quản lý chấm công khuôn mặt</span>
    </div>

    <div class="login-card">
      <div class="field-group">
        <label class="field-label" for="loginEmail">EMAIL</label>
        <input id="loginEmail" type="email" class="field-input" placeholder="admin@tranquycap.edu.vn" autocomplete="username" />
      </div>
      <div class="field-group">
        <label class="field-label" for="loginPassword">MẬT KHẨU</label>
        <input id="loginPassword" type="password" class="field-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p id="loginError" class="login-error"></p>
      <button id="loginBtn" class="login-submit">ĐĂNG NHẬP</button>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
